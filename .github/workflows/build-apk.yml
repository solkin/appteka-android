name: Appteka Build
permissions:
  contents: write
on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        build_type: [debug]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assemble${{ matrix.build_type }} --warning-mode all

      - name: Upload Gradle Problem Report
        uses: actions/upload-artifact@v6
        with:
          name: gradle-problem-report-${{ matrix.build_type }}-${{ github.run_id }}
          path: build/reports/problems/
          if-no-files-found: warn

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: appteka-apk-${{ matrix.build_type }}-${{ github.run_id }}
          path: app/build/outputs/apk/${{ matrix.build_type }}/app-${{ matrix.build_type }}.apk
